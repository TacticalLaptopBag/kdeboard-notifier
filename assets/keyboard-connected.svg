<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- keyboard body -->
  <rect x="0.5" y="3.5" width="17" height="11" rx="1.5" fill="#333333"/>
  <!-- top row keys -->
  <rect x="2" y="5.5" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="5" y="5.5" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="8" y="5.5" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="11" y="5.5" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="14" y="5.5" width="2.5" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <!-- middle row keys -->
  <rect x="2" y="8.5" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="5" y="8.5" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="8" y="8.5" width="2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="11" y="8.5" width="5.5" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <!-- space bar -->
  <rect x="4" y="11.5" width="10" height="1.5" rx="0.4" fill="white" opacity="0.85"/>
  <!-- green badge -->
  <circle cx="17.5" cy="17.5" r="4.5" fill="#27ae60"/>
  <polyline points="15.2,17.5 16.8,19.1 19.8,15.5"
            fill="none" stroke="white" stroke-width="1.4"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
