<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- keyboard body (grayed) -->
  <rect x="0.5" y="3.5" width="17" height="11" rx="1.5" fill="#888888"/>
  <!-- top row keys -->
  <rect x="2" y="5.5" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="5" y="5.5" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="8" y="5.5" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="11" y="5.5" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="14" y="5.5" width="2.5" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <!-- middle row keys -->
  <rect x="2" y="8.5" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="5" y="8.5" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="8" y="8.5" width="2" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <rect x="11" y="8.5" width="5.5" height="2" rx="0.4" fill="white" opacity="0.6"/>
  <!-- space bar -->
  <rect x="4" y="11.5" width="10" height="1.5" rx="0.4" fill="white" opacity="0.6"/>
  <!-- red badge -->
  <circle cx="17.5" cy="17.5" r="4.5" fill="#e74c3c"/>
  <line x1="15.3" y1="15.3" x2="19.7" y2="19.7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.7" y1="15.3" x2="15.3" y2="19.7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
