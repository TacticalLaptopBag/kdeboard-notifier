# Flatpak manifest for kdeboard-notifier.
# App ID — change this (and the install paths below) to match your preferred
# reverse-domain identifier before submitting to Flathub or a personal repo.
id: io.github.tacticallaptopbag.KDEBoardNotifier

runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: kdeboard-notifier

finish-args:
  # Read USB device names from sysfs (setup UI and connection polling)
  - --filesystem=/sys/bus/usb/devices:ro
  # KDE color scheme and font settings for theming
  - --filesystem=xdg-config/kdeglobals:ro
  # Wayland socket for the iced config window
  - --socket=wayland
  # X11 fallback
  - --socket=fallback-x11
  - --share=ipc
  # SNI system tray: full session bus needed because the item registers a
  # dynamic D-Bus name (org.kde.StatusNotifierItem-<pid>-1) that uses hyphens,
  # which Flatpak's proxy can't match with its dot-boundary wildcard syntax.
  - --socket=session-bus

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

modules:
  - name: kdeboard-notifier
    buildsystem: simple
    build-commands:
      - cargo build --release --frozen
      - install -Dm755 target/release/kdeboard-notifier /app/bin/kdeboard-notifier
      - install -Dm644 assets/kdeboard-notifier.desktop
          /app/share/applications/io.github.tacticallaptopbag.KDEBoardNotifier.desktop
      - install -Dm644 assets/keyboard-connected.svg
          /app/share/icons/hicolor/scalable/apps/io.github.tacticallaptopbag.KDEBoardNotifier.svg
    sources:
      - type: dir
        path: .
      # Generated by flatpak-cargo-generator — see generate-flatpak-sources.sh
      - cargo-sources.json
      # Redirects cargo to the vendored crates downloaded by cargo-sources.json
      - type: inline
        dest: .cargo
        dest-filename: config.toml
        contents: |
          [source.crates-io]
          replace-with = "vendored-sources"

          [source.vendored-sources]
          directory = "cargo/vendor"
